<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scheduled posts — A to Z Meta Publisher</title>
  <link rel="stylesheet" href="/css/admin-theme.css">
</head>
<body>
  <header class="installer-admin-topbar">
    <div class="installer-admin-topbar-inner">
      <a href="/admin" class="installer-admin-brand">
        <img src="/customcolor_logo_transparent_background.jpeg" alt="A to Z Flooring Solutions" />
      </a>
      <div class="installer-admin-topbar-titles">
        <span class="installer-admin-topbar-title">Meta Publisher</span>
        <span class="installer-admin-topbar-sub">Scheduled posts</span>
      </div>
    </div>
  </header>
  <div class="admin-page admin-scheduled-posts">
  <nav class="admin-nav" aria-label="Breadcrumb">
    <a href="/admin">← Admin</a><span class="sep" aria-hidden="true">·</span><a href="/">Health home</a>
  </nav>
  <h1>Scheduled posts</h1>
  <p>Internal admin UI. Pending rows can be cancelled or sent immediately.</p>
  <div class="toolbar">
    <button type="button" id="refresh">Refresh</button>
    <span id="status"></span>
  </div>
  <div id="banner"></div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Platform</th>
        <th>Run time (local)</th>
        <th>Caption</th>
        <th>Image</th>
        <th>Status</th>
        <th>Last error</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const rowsEl = document.getElementById('rows');
    const bannerEl = document.getElementById('banner');
    const statusEl = document.getElementById('status');

    function showBanner(text, kind) {
      bannerEl.innerHTML = text
        ? '<div class="msg ' + (kind === 'error' ? 'error' : 'ok') + '">' + escapeHtml(text) + '</div>'
        : '';
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function previewCaption(caption, max) {
      if (!caption) return '';
      if (caption.length <= max) return caption;
      return caption.slice(0, max) + '…';
    }

    function localTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString();
    }

    async function loadRows() {
      statusEl.textContent = 'Loading…';
      bannerEl.innerHTML = '';
      try {
        const res = await fetch('/api/scheduled-posts');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const items = data.items || [];
        statusEl.textContent = items.length + ' row(s)';
        rowsEl.innerHTML = '';
        for (const row of items) {
          const tr = document.createElement('tr');
          const pending = row.status === 'pending';
          const actions = document.createElement('td');
          actions.className = 'actions';
          if (pending) {
            const cancelBtn = document.createElement('button');
            cancelBtn.type = 'button';
            cancelBtn.textContent = 'Cancel';
            cancelBtn.addEventListener('click', () => doCancel(row.id));
            const sendBtn = document.createElement('button');
            sendBtn.type = 'button';
            sendBtn.textContent = 'Send now';
            sendBtn.addEventListener('click', () => doForceSend(row.id));
            actions.appendChild(cancelBtn);
            actions.appendChild(sendBtn);
          } else {
            actions.textContent = '—';
          }
          const mediaUrl = row.mediaUrl || '';
          const mediaCell = mediaUrl
            ? '<td class="media"><a href="' +
                encodeURI(mediaUrl).replace(/'/g, '%27') +
                '" target="_blank" rel="noopener">link</a></td>'
            : '<td>—</td>';
          tr.innerHTML =
            '<td>' + row.id + '</td>' +
            '<td>' + escapeHtml(row.platform) + '</td>' +
            '<td>' + escapeHtml(localTime(row.runAt)) + '</td>' +
            '<td class="caption" title="' + escapeHtml(row.caption || '') + '">' +
              escapeHtml(previewCaption(row.caption, 80)) +
            '</td>' +
            mediaCell +
            '<td>' + escapeHtml(row.status) + '</td>' +
            '<td class="err">' + escapeHtml(row.lastError || '') + '</td>';
          tr.appendChild(actions);
          rowsEl.appendChild(tr);
        }
      } catch (e) {
        statusEl.textContent = 'Error';
        showBanner(e instanceof Error ? e.message : String(e), 'error');
      }
    }

    async function doCancel(id) {
      showBanner('');
      try {
        const res = await fetch('/api/scheduled-posts/' + id + '/cancel', { method: 'POST' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showBanner(data.message || ('Cancel failed: HTTP ' + res.status), 'error');
          return;
        }
        showBanner('Cancelled #' + id, 'ok');
        await loadRows();
      } catch (e) {
        showBanner(e instanceof Error ? e.message : String(e), 'error');
      }
    }

    async function doForceSend(id) {
      showBanner('');
      try {
        const res = await fetch('/api/scheduled-posts/' + id + '/force-send', { method: 'POST' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showBanner(data.message || ('Send failed: HTTP ' + res.status), 'error');
          return;
        }
        showBanner(
          data.success ? (data.message || 'Posted') : (data.message || 'Failed'),
          data.success ? 'ok' : 'error'
        );
        await loadRows();
      } catch (e) {
        showBanner(e instanceof Error ? e.message : String(e), 'error');
      }
    }

    document.getElementById('refresh').addEventListener('click', loadRows);
    loadRows();
  </script>
  </div>
</body>
</html>
