<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Competitor insights — A to Z Meta Publisher</title>
  <link rel="stylesheet" href="/css/admin-theme.css">
</head>
<body>
  <header class="installer-admin-topbar">
    <div class="installer-admin-topbar-inner">
      <a href="/admin" class="installer-admin-brand">
        <img src="/customcolor_logo_transparent_background.jpeg" alt="A to Z Flooring Solutions" />
      </a>
      <div class="installer-admin-topbar-titles">
        <span class="installer-admin-topbar-title">Meta Publisher</span>
        <span class="installer-admin-topbar-sub">Competitor insights</span>
      </div>
    </div>
  </header>
  <div class="admin-page admin-page--insights">
  <nav class="admin-nav" aria-label="Breadcrumb">
    <a href="/admin">← Admin</a><span class="sep" aria-hidden="true">·</span><a href="/">Health home</a>
  </nav>
  <h1>Competitor insights</h1>
  <p class="sub">
    Public HTML snapshots stored in <code>competitor_signals</code> (same grouping as MCP <code>generate_competitor_report</code>).
    Best-effort only; not exposed via MCP — internal health server only.
  </p>

  <div class="toolbar">
    <label for="lookback">Lookback window</label>
    <select id="lookback" aria-label="Lookback days">
      <option value="7">7 days</option>
      <option value="14" selected>14 days</option>
      <option value="30">30 days</option>
    </select>
    <button type="button" id="refresh">Refresh</button>
    <span id="status"></span>
  </div>

  <div id="banner"></div>
  <div id="content"></div>

  <script>
    (function () {
      var lookbackEl = document.getElementById('lookback');
      var refreshEl = document.getElementById('refresh');
      var statusEl = document.getElementById('status');
      var bannerEl = document.getElementById('banner');
      var contentEl = document.getElementById('content');

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function badgeClass(source) {
        var s = (source || '').toLowerCase();
        if (s === 'website') return 'website';
        if (s === 'facebook') return 'facebook';
        return 'other';
      }

      function showBanner(html, kind) {
        if (!html) {
          bannerEl.innerHTML = '';
          return;
        }
        bannerEl.innerHTML = '<div class="msg ' + kind + '">' + html + '</div>';
      }

      async function loadReport() {
        var days = parseInt(lookbackEl.value, 10) || 14;
        statusEl.textContent = 'Loading…';
        showBanner('Loading…', 'loading');
        contentEl.innerHTML = '';

        try {
          var res = await fetch('/api/competitor-report?lookbackDays=' + encodeURIComponent(String(days)));
          var text = await res.text();
          if (!res.ok) {
            showBanner('Request failed (HTTP ' + res.status + '): ' + escapeHtml(text.slice(0, 400)), 'error');
            statusEl.textContent = 'Error';
            return;
          }
          var data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            showBanner('Invalid JSON response', 'error');
            statusEl.textContent = 'Error';
            return;
          }

          showBanner('', '');
          var comps = data.competitors || [];
          var actualDays = data.lookbackDays != null ? data.lookbackDays : days;
          statusEl.textContent = comps.length === 0
            ? 'Showing last ' + actualDays + ' day(s) — no rows'
            : 'Showing last ' + actualDays + ' day(s) — ' + comps.length + ' competitor(s)';

          if (comps.length === 0) {
            contentEl.innerHTML =
              '<div class="msg empty">No signals in this window. ' +
              'Ensure <code>SCRAPING_ENABLED=true</code> and run <code>runDailyCompetitorScrape()</code> ' +
              '(or wait for the daily scheduler) so <code>competitor_signals</code> is populated.</div>';
            return;
          }

          var frag = document.createDocumentFragment();
          for (var i = 0; i < comps.length; i++) {
            var c = comps[i];
            var section = document.createElement('section');
            section.className = 'competitor';
            var h2 = document.createElement('h2');
            h2.textContent = c.name || '(unnamed)';
            section.appendChild(h2);

            var signals = c.signals || [];
            if (signals.length === 0) {
              var p = document.createElement('p');
              p.textContent = 'No signals for this competitor in the window.';
              section.appendChild(p);
              frag.appendChild(section);
              continue;
            }

            var table = document.createElement('table');
            table.innerHTML =
              '<thead><tr>' +
              '<th>Date</th><th>Source</th><th>Headline</th><th>Summary</th><th>URL</th>' +
              '</tr></thead>';
            var tbody = document.createElement('tbody');
            for (var j = 0; j < signals.length; j++) {
              var sig = signals[j];
              var tr = document.createElement('tr');
              var src = sig.source || '';
              var badge = '<span class="badge ' + badgeClass(src) + '">' + escapeHtml(src) + '</span>';
              var url = sig.url || '';
              var linkCell = url
                ? '<a href="' + encodeURI(url).replace(/'/g, '%27') + '" target="_blank" rel="noopener">Open</a>'
                : '—';
              tr.innerHTML =
                '<td>' + escapeHtml(sig.dateIso || '') + '</td>' +
                '<td>' + badge + '</td>' +
                '<td>' + escapeHtml(sig.headline || '') + '</td>' +
                '<td class="summary">' + escapeHtml(sig.summary || '') + '</td>' +
                '<td>' + linkCell + '</td>';
              tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            section.appendChild(table);
            frag.appendChild(section);
          }
          contentEl.appendChild(frag);
        } catch (e) {
          showBanner(e instanceof Error ? escapeHtml(e.message) : String(e), 'error');
          statusEl.textContent = 'Error';
        }
      }

      lookbackEl.addEventListener('change', loadReport);
      refreshEl.addEventListener('click', loadReport);
      loadReport();
    })();
  </script>
  </div>
</body>
</html>
