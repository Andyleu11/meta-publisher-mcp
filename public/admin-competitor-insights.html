<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Competitor insights — A to Z Meta Publisher</title>
  <style>
    body { font-family: system-ui, Segoe UI, sans-serif; margin: 1rem 1.5rem; max-width: 960px; line-height: 1.4; }
    h1 { font-size: 1.35rem; margin-bottom: 0.25rem; }
    .sub { color: #444; font-size: 0.9rem; margin-bottom: 1rem; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
    label { font-size: 0.9rem; }
    select { padding: 0.35rem 0.5rem; font-size: 0.9rem; }
    button { padding: 0.35rem 0.75rem; cursor: pointer; }
    .msg { padding: 0.75rem 1rem; border-radius: 6px; margin: 0.75rem 0; }
    .msg.error { background: #fee; color: #700; border: 1px solid #ecc; }
    .msg.empty { background: #f7f7f7; color: #333; border: 1px solid #ddd; }
    .msg.loading { background: #eef6ff; color: #124; border: 1px solid #cde; }
    .competitor { margin: 1.5rem 0; padding-top: 1rem; border-top: 1px solid #ccc; }
    .competitor:first-of-type { border-top: none; padding-top: 0; }
    .competitor h2 { font-size: 1.1rem; margin: 0 0 0.5rem 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { border: 1px solid #ccc; padding: 0.45rem 0.6rem; text-align: left; vertical-align: top; }
    th { background: #f4f4f4; }
    .badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
    .badge.website { background: #e8f4ea; color: #1b5e20; }
    .badge.facebook { background: #e3f2fd; color: #0d47a1; }
    .badge.other { background: #f4f4f4; color: #333; }
    .summary { max-width: 360px; word-break: break-word; }
    a { color: #06c; }
    code { font-size: 0.85em; background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 3px; }
  </style>
</head>
<body>
  <p><a href="/admin">← Admin</a> · <a href="/">Health home</a></p>
  <h1>Competitor insights</h1>
  <p class="sub">
    Public HTML snapshots stored in <code>competitor_signals</code> (same grouping as MCP <code>generate_competitor_report</code>).
    Best-effort only; not exposed via MCP — internal health server only.
  </p>

  <div class="toolbar">
    <label for="lookback">Lookback window</label>
    <select id="lookback" aria-label="Lookback days">
      <option value="7">7 days</option>
      <option value="14" selected>14 days</option>
      <option value="30">30 days</option>
    </select>
    <button type="button" id="refresh">Refresh</button>
    <span id="status"></span>
  </div>

  <div id="banner"></div>
  <div id="content"></div>

  <script>
    (function () {
      var lookbackEl = document.getElementById('lookback');
      var refreshEl = document.getElementById('refresh');
      var statusEl = document.getElementById('status');
      var bannerEl = document.getElementById('banner');
      var contentEl = document.getElementById('content');

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function badgeClass(source) {
        var s = (source || '').toLowerCase();
        if (s === 'website') return 'website';
        if (s === 'facebook') return 'facebook';
        return 'other';
      }

      function showBanner(html, kind) {
        if (!html) {
          bannerEl.innerHTML = '';
          return;
        }
        bannerEl.innerHTML = '<div class="msg ' + kind + '">' + html + '</div>';
      }

      async function loadReport() {
        var days = parseInt(lookbackEl.value, 10) || 14;
        statusEl.textContent = 'Loading…';
        showBanner('Loading…', 'loading');
        contentEl.innerHTML = '';

        try {
          var res = await fetch('/api/competitor-report?lookbackDays=' + encodeURIComponent(String(days)));
          var text = await res.text();
          if (!res.ok) {
            showBanner('Request failed (HTTP ' + res.status + '): ' + escapeHtml(text.slice(0, 400)), 'error');
            statusEl.textContent = 'Error';
            return;
          }
          var data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            showBanner('Invalid JSON response', 'error');
            statusEl.textContent = 'Error';
            return;
          }

          showBanner('', '');
          var comps = data.competitors || [];
          var actualDays = data.lookbackDays != null ? data.lookbackDays : days;
          statusEl.textContent = comps.length === 0
            ? 'Showing last ' + actualDays + ' day(s) — no rows'
            : 'Showing last ' + actualDays + ' day(s) — ' + comps.length + ' competitor(s)';

          if (comps.length === 0) {
            contentEl.innerHTML =
              '<div class="msg empty">No signals in this window. ' +
              'Ensure <code>SCRAPING_ENABLED=true</code> and run <code>runDailyCompetitorScrape()</code> ' +
              '(or wait for the daily scheduler) so <code>competitor_signals</code> is populated.</div>';
            return;
          }

          var frag = document.createDocumentFragment();
          for (var i = 0; i < comps.length; i++) {
            var c = comps[i];
            var section = document.createElement('section');
            section.className = 'competitor';
            var h2 = document.createElement('h2');
            h2.textContent = c.name || '(unnamed)';
            section.appendChild(h2);

            var signals = c.signals || [];
            if (signals.length === 0) {
              var p = document.createElement('p');
              p.textContent = 'No signals for this competitor in the window.';
              section.appendChild(p);
              frag.appendChild(section);
              continue;
            }

            var table = document.createElement('table');
            table.innerHTML =
              '<thead><tr>' +
              '<th>Date</th><th>Source</th><th>Headline</th><th>Summary</th><th>URL</th>' +
              '</tr></thead>';
            var tbody = document.createElement('tbody');
            for (var j = 0; j < signals.length; j++) {
              var sig = signals[j];
              var tr = document.createElement('tr');
              var src = sig.source || '';
              var badge = '<span class="badge ' + badgeClass(src) + '">' + escapeHtml(src) + '</span>';
              var url = sig.url || '';
              var linkCell = url
                ? '<a href="' + encodeURI(url).replace(/'/g, '%27') + '" target="_blank" rel="noopener">Open</a>'
                : '—';
              tr.innerHTML =
                '<td>' + escapeHtml(sig.dateIso || '') + '</td>' +
                '<td>' + badge + '</td>' +
                '<td>' + escapeHtml(sig.headline || '') + '</td>' +
                '<td class="summary">' + escapeHtml(sig.summary || '') + '</td>' +
                '<td>' + linkCell + '</td>';
              tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            section.appendChild(table);
            frag.appendChild(section);
          }
          contentEl.appendChild(frag);
        } catch (e) {
          showBanner(e instanceof Error ? escapeHtml(e.message) : String(e), 'error');
          statusEl.textContent = 'Error';
        }
      }

      lookbackEl.addEventListener('change', loadReport);
      refreshEl.addEventListener('click', loadReport);
      loadReport();
    })();
  </script>
</body>
</html>
