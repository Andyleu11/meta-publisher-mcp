<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload supplier emails — A to Z</title>
  <link rel="stylesheet" href="/css/admin-theme.css">
</head>
<body>
  <header class="installer-admin-topbar">
    <div class="installer-admin-topbar-inner">
      <a href="/admin" class="installer-admin-brand">
        <img src="/customcolor_logo_transparent_background.jpeg" alt="A to Z Flooring Solutions" />
      </a>
      <div class="installer-admin-topbar-titles">
        <span class="installer-admin-topbar-title">Meta Publisher</span>
        <span class="installer-admin-topbar-sub">Supplier email upload</span>
      </div>
    </div>
  </header>
  <div class="admin-page admin-page--narrow">
  <nav class="admin-nav" aria-label="Breadcrumb">
    <a href="/admin">← Admin</a><span class="sep" aria-hidden="true">·</span><a href="/">Health home</a>
  </nav>
  <h1>Upload supplier emails</h1>
  <p class="admin-lead">Drop <strong>.eml</strong>, <strong>.msg</strong>, or <strong>.zip</strong> (containing .eml/.msg). Parsed on the server; nothing is posted to social media.</p>

  <div class="upload-field">
    <label for="manualTags">Optional tags (comma-separated, e.g. <code>Polyflor promo, Hybrid bulletin</code>)</label>
    <input type="text" id="manualTags" placeholder="manual tags for this batch" />
  </div>

  <div id="zone" class="upload-zone">
    <p>Drag files here or</p>
    <input type="file" id="file" multiple accept=".eml,.msg,.zip" />
  </div>
  <div id="out" class="upload-out"></div>

  <script>
    const zone = document.getElementById('zone');
    const out = document.getElementById('out');
    const fileInput = document.getElementById('file');
    const manualTags = document.getElementById('manualTags');

    const apiBase = ''; // same origin

    function show(t, cls) {
      out.innerHTML = '<div class="' + (cls || '') + '">' + t + '</div>';
    }

    async function upload(files) {
      if (!files.length) return;
      show('Uploading…', '');
      const fd = new FormData();
      for (const f of files) fd.append('files', f);
      const tags = manualTags.value.trim();
      if (tags) fd.append('manualTags', tags);
      try {
        const res = await fetch(apiBase + '/api/upload-email', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) {
          show('Error: ' + (data.error || res.status), 'err');
          return;
        }
        const lines = [];
        for (const r of data.results || []) {
          lines.push('— ' + r.filename + ' [' + r.status + '] id=' + r.id);
          if (r.error) lines.push('  ERROR: ' + r.error);
          for (const ing of r.ingestions || []) {
            lines.push('  From: ' + ing.fromEmail);
            lines.push('  Subject: ' + ing.subject);
            lines.push('  Supplier match: ' + (ing.matchedSupplier || 'none'));
            lines.push('  Attachments saved: ' + (ing.attachmentNames?.length || 0));
            lines.push('  DB row: ' + (ing.storedId ?? '—'));
            lines.push('  ' + ing.message);
          }
        }
        show(lines.join('\n'), 'ok');
      } catch (e) {
        show(String(e), 'err');
      }
    }

    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag');
      upload(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => upload(fileInput.files));
  </script>
  </div>
</body>
</html>
